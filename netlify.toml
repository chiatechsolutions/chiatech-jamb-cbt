# =========================================================
# CHIATECH CBT — NETLIFY CONFIG
# =========================================================

[build]
  publish = "."
  command = ""

# =========================================================
# SPA REDIRECT (VERY IMPORTANT)
# Prevents 404 when navigating pages
# =========================================================
[[redirects]]
  from = "/*"
  to = "/subject.html"
  status = 200

# =========================================================
# SECURITY HEADERS
# =========================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# =========================================================
# SERVICE WORKER (NO CACHE — ALWAYS UPDATE)
# =========================================================
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

# =========================================================
# HTML FILES (ALWAYS FRESH)
# =========================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# =========================================================
# STATIC ASSETS (FAST CACHE)
# =========================================================
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/questions/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =========================================================
# MATHJAX (CACHEABLE BUT SAFE)
# =========================================================
[[headers]]
  for = "/mathjax/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# =========================================================
# MANIFEST (SHOULD UPDATE)
# =========================================================
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"