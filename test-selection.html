<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Selection — ChiaTech CBT 2026</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#184d28">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a2e0a, #0d2d6b);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .wrapper {
            background: white;
            border-radius: 15px;
            width: 100%;
            max-width: 750px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            margin: auto;
        }
        .header {
            background: linear-gradient(135deg, #0a2e0a, #0d2d6b);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        .header h2 { font-size: 1.4rem; letter-spacing: 2px; }
        .header p  { font-size: 0.85rem; opacity: 0.75; margin-top: 5px; }
        .student-info {
            background: #f0f7f0;
            padding: 14px 25px;
            font-size: 0.88rem;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        .student-info span { font-weight: 700; color: #0a2e0a; }
        .body { padding: 28px; }
        .section-title {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #555;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }
        .subject-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            background: white;
        }
        .card:hover {
            border-color: #0a2e0a;
            background: #f0f7f0;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .card .icon { font-size: 2rem; margin-bottom: 8px; }
        .card .name { font-size: 0.88rem; font-weight: 800; letter-spacing: 1px; color: #333; }
        .card .count { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .card.english { border-color: #0a2e0a; background: #f0f7f0; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #eee;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            color: #555;
            transition: 0.3s;
        }
        .back-btn:hover { background: #ddd; }
        .info-note {
            background: #fff8e1;
            border-left: 4px solid #f9a825;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.83rem;
            color: #555;
            margin-bottom: 22px;
        }
        @media (max-width: 500px) { .subject-cards { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h2>📋 SELECT A SUBJECT TO PRACTICE</h2>
        <p>Click any subject below to begin your CBT session</p>
    </div>
    <div class="student-info">
        Student: <span id="studentNameDisplay">—</span> &nbsp;|&nbsp;
        Subjects: <span id="subjectCount">—</span>
    </div>
    <div class="body">
        <div class="info-note">
            ⏱️ Each subject has <strong>40 questions</strong> | Time: <strong>30 minutes</strong> | Score is shown at the end
        </div>
        <div class="section-title">📚 YOUR SUBJECTS (Click to Start)</div>
        <div class="subject-cards" id="cardsContainer"></div>
        <button class="back-btn" onclick="window.location.href='index.html'">← Back to Registration</button>
    </div>
</div>
<script>
    var icons = {
        English: "📝", Physics: "🔬", Chemistry: "🧪",
        Biology: "🧬", Mathematics: "√", Economics: "📈",
        Government: "🏛️", Literature: "📖", CRK: "✝️",
        Commerce: "🏪", Accounting: "📊", Computer: "💻",
        Geography: "🌍"
    };

    var verified = localStorage.getItem("ct_verified");
    if (verified !== "true") {
        window.location.href = "index.html";
    }

    var name     = localStorage.getItem("ct_name") || "Student";
    var stored   = localStorage.getItem("ct_subjects");
    var subjects = stored ? JSON.parse(stored) : [];
    var allSubs  = ["English"].concat(subjects);

    document.getElementById("studentNameDisplay").textContent = name;
    document.getElementById("subjectCount").textContent = allSubs.length + " subjects";

    var container = document.getElementById("cardsContainer");

    for (var i = 0; i < allSubs.length; i++) {
        (function(sub) {
            var card = document.createElement("div");
            card.className = "card" + (sub === "English" ? " english" : "");
            card.innerHTML =
                '<div class="icon">' + (icons[sub] || "📚") + '</div>' +
                '<div class="name">' + sub.toUpperCase() + '</div>' +
                '<div class="count">40 Questions · 30 mins</div>';
            card.onclick = function() {
                localStorage.setItem("ct_current_subject", sub);
                window.location.href = "test.html";
            };
            container.appendChild(card);
        })(allSubs[i]);
    }
</script>
</body>
</html>
